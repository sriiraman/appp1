trigger:
- main

pool:
  name: AzurePoolAgent

steps:

- task: Docker@2
  inputs:
    command: build
    Dockerfile: Dockerfile
    tags: devops-demo

- script: dir
  displayName: Show Repository Files
  
- script: |
    kubectl apply -f appp1/deployment.yaml
    kubectl apply -f appp1/service.yaml
  displayName: Deploy to Kubernetes